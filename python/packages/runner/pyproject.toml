[project]
name = "varar-runner"
version = "0.7.0"
description = "Shared oath discovery + run orchestration for varar runners"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["varar==0.7.0", "varar-config==0.7.0"]

[project.scripts]
varar = "varar_runner.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/varar_runner"]
