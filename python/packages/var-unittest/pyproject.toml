[project]
name = "oselvar-var-unittest"
version = "0.3.0"
description = "unittest adapter for Markdown-native BDD"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["oselvar-var==0.3.0", "oselvar-var-config==0.3.0", "oselvar-var-core==0.3.0", "oselvar-var-runner==0.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/var_unittest"]
