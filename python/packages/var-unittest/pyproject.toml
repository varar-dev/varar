[project]
name = "oselvar-var-unittest"
version = "0.4.2"
description = "unittest adapter for Markdown-native BDD"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["oselvar-var==0.4.2", "oselvar-var-config==0.4.2", "oselvar-var-core==0.4.2", "oselvar-var-runner==0.4.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/var_unittest"]
