[project]
name = "oselvar-var"
version = "0.4.2"
description = "Markdown-native BDD — pure Python core (port of @oselvar/var)"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "cucumber-expressions==20.0.0",
    "oselvar-var-core==0.4.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/var"]
