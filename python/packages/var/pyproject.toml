[project]
name = "oselvar-var"
version = "0.0.0"
description = "Markdown-native BDD — pure Python core (port of @oselvar/var)"
requires-python = ">=3.11"
dependencies = [
    "cucumber-expressions==20.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/var"]
