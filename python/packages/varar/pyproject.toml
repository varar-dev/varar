[project]
name = "varar"
version = "0.5.2"
description = "Markdown-native BDD — pure Python core (port of @varar/varar)"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "cucumber-expressions==20.0.0",
    "varar-core==0.5.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/varar"]
