[project]
name = "pytest-var"
version = "0.0.0"
description = "pytest plugin for Markdown-native BDD (skeleton — see issue #2)"
requires-python = ">=3.11"
dependencies = ["oselvar-var"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/var_pytest"]
