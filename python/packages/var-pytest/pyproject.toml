[project]
name = "pytest-var"
version = "0.4.1"
description = "pytest plugin for Markdown-native BDD"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["oselvar-var==0.4.1", "oselvar-var-config==0.4.1", "oselvar-var-core==0.4.1", "oselvar-var-runner==0.4.1", "pytest>=8"]

[project.entry-points.pytest11]
var = "var_pytest.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/var_pytest"]
