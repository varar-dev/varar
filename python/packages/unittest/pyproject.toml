[project]
name = "varar-unittest"
version = "0.4.2"
description = "unittest adapter for Markdown-native BDD"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["varar==0.4.2", "varar-config==0.4.2", "varar-core==0.4.2", "varar-runner==0.4.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/varar_unittest"]
