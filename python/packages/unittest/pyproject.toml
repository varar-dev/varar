[project]
name = "varar-unittest"
version = "0.6.1"
description = "unittest adapter for Markdown-native BDD"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["varar==0.6.1", "varar-config==0.6.1", "varar-core==0.6.1", "varar-runner==0.6.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/varar_unittest"]
