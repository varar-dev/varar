[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
oselvar-var = { workspace = true }
oselvar-var-core = { workspace = true }
oselvar-var-runner = { workspace = true }

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.6"]

[tool.pytest.ini_options]
testpaths = ["packages"]

[tool.ruff]
line-length = 100
target-version = "py311"
