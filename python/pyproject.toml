[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
varar = { workspace = true }
varar-config = { workspace = true }
varar-core = { workspace = true }
varar-runner = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=7",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts = "--import-mode=importlib"

# Dogfood: run the shared conformance bundles as LIVE var-pytest oaths.
#   cd python && uv run pytest --rootdir=. ../conformance/bundles
# Edit any listed bundle's example.md or *.steps.py and re-run to see var
# pass/fail change. NOTE: the plugin builds ONE global step registry, but the
# conformance bundles intentionally reuse expressions across bundles
# (`I echo…`, `I have {int} cukes`, `I greet {string}`). So this is a
# COLLISION-FREE subset — a mix of passing bundles and two that fail by design
# (07 row-check-mismatch, 09 expected-message-mismatch). See varar.config.json.

[tool.ruff]
line-length = 100
target-version = "py311"

# Coverage is opt-in (not in addopts, so plain pytest runs stay fast):
#   uv run pytest --cov
# Text summary on stdout; HTML in htmlcov/; lcov in coverage.lcov for
# editor/CI integrations. Mirrors typescript's `pnpm test:coverage`.
[tool.coverage.run]
source_pkgs = ["varar", "varar_config", "varar_core", "varar_pytest", "varar_runner", "varar_unittest"]

[tool.coverage.report]
show_missing = true
# Ratchet: ~2 points under the level last measured. Raise as coverage grows;
# never lower. We measure with `coverage run -m pytest` (not `pytest --cov`) so
# coverage's tracer is armed before pytest autoloads the varar_pytest plugin —
# otherwise the plugin and everything it imports load unmeasured and the level is
# badly understated (this is why it read ~66% before, vs ~96% now).
fail_under = 93

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.lcov]
output = "coverage.lcov"
