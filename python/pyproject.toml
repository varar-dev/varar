[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
oselvar-var = { workspace = true }
oselvar-var-config = { workspace = true }
oselvar-var-core = { workspace = true }
oselvar-var-runner = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=7",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts = "--import-mode=importlib"

# Dogfood: run the shared conformance bundles as LIVE var-pytest specs.
#   cd python && uv run pytest --rootdir=. ../conformance/bundles
# Edit any listed bundle's example.md or *.steps.py and re-run to see var
# pass/fail change. NOTE: the plugin builds ONE global step registry, but the
# conformance bundles intentionally reuse expressions across bundles
# (`I echo…`, `I have {int} cukes`, `I greet {string}`). So this is a
# COLLISION-FREE subset — a mix of passing bundles and two that fail by design
# (07 row-check-mismatch, 09 expected-message-mismatch). See var.config.json.

[tool.ruff]
line-length = 100
target-version = "py311"

# Coverage is opt-in (not in addopts, so plain pytest runs stay fast):
#   uv run pytest --cov
# Text summary on stdout; HTML in htmlcov/; lcov in coverage.lcov for
# editor/CI integrations. Mirrors typescript's `pnpm test:coverage`.
[tool.coverage.run]
source_pkgs = ["var", "var_config", "var_core", "var_pytest", "var_runner", "var_unittest"]

[tool.coverage.report]
show_missing = true

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.lcov]
output = "coverage.lcov"
