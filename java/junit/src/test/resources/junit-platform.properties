# Test-only fixture for ConfigPrecedenceTest (Task 12): confirms which tier of
# org.junit.platform.engine.ConfigurationParameters wins when the SAME key is set both here
# and as a JVM system property. `var.junit.configPrecedenceTest` is not a real var config key
# (ConfigBridge only ever reads var.config.root, the directory holding varar.config.json), so
# this file is inert for every other test in this module and for the "varar" engine's own real
# `mvn test` discovery pass over this module -- EngineTestKit's Builder also disables implicit
# configuration parameters (system properties + this file) by default, so no other
# EngineTestKit-based test in this module reads this file either.
var.junit.configPrecedenceTest=from-junit-platform-properties-file
