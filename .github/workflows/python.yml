name: Python

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - 'conformance/**'
      - 'doc/examples/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'conformance/**'
      - 'doc/examples/**'
      - '.github/workflows/python.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --locked

      - run: uv run pytest --cov

      - run: uv run ruff check

      - run: uv run python scripts/lint_no_reexports.py

      # Standalone sample project (see doc/examples and python/examples-pytest).
      - run: uv run pytest
        working-directory: python/examples-pytest
