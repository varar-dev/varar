name: Java

on:
  push:
    branches: [main]
    paths:
      - 'java/**'
      - 'conformance/**'
      - 'doc/examples/**'
      - '.github/workflows/java.yml'
  pull_request:
    paths:
      - 'java/**'
      - 'conformance/**'
      - 'doc/examples/**'
      - '.github/workflows/java.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: mvn --batch-mode verify

      # Standalone sample projects (see doc/examples and java/examples-*):
      # they consume the released com.oselvar artifacts from Maven Central.
      - run: mvn --batch-mode test
        working-directory: java/examples-java-junit-maven

      - run: ./gradlew --console=plain test
        working-directory: java/examples-java-junit-gradle

      - run: ./gradlew --console=plain test
        working-directory: java/examples-kotlin-junit

      - run: ./gradlew --console=plain test
        working-directory: java/examples-kotlin-kotest
