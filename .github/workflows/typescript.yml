name: TypeScript

on:
  push:
    branches: [main]
    paths:
      - 'typescript/**'
      - 'conformance/**'
      - '.github/workflows/typescript.yml'
  pull_request:
    paths:
      - 'typescript/**'
      - 'conformance/**'
      - '.github/workflows/typescript.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check

  deploy-website:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-website
      cancel-in-progress: false
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @oselvar/website-starlight... build

      - run: pnpm dlx wrangler@4.106.0 deploy
        working-directory: typescript/packages/website-starlight
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
