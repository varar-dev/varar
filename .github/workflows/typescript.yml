name: TypeScript

on:
  push:
    branches: [main]
    paths:
      - 'typescript/**'
      - 'conformance/**'
      - 'examples/**'
      - 'var.config.json'
      - '.github/workflows/typescript.yml'
  pull_request:
    paths:
      - 'typescript/**'
      - 'conformance/**'
      - 'examples/**'
      - 'var.config.json'
      - '.github/workflows/typescript.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check

      # Build the website on PRs too: `pnpm build`/`pnpm check` exclude it, but
      # its <Editor> components assert at build time that every port in
      # languages.json has example files, so this is where a forgotten port's
      # missing examples become a red build instead of surfacing only at deploy.
      - run: pnpm --filter @oselvar/website... build

  deploy-website:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-website
      cancel-in-progress: false
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @oselvar/website... build

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: typescript/packages/website
          wranglerVersion: "4"
          packageManager: pnpm
