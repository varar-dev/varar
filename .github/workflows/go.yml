name: Go

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - 'conformance/**'
      - 'examples/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'go/**'
      - 'conformance/**'
      - 'examples/**'
      - '.github/workflows/go.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The Go version is never written here — it comes from the repo-root
      # .tool-versions, the same pin `make install-tools` installs locally, so
      # CI and a developer machine cannot drift apart.
      - name: Toolchain pin
        id: pin
        run: echo "go=$(awk '/^golang /{print $2; exit}' .tool-versions)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ steps.pin.outputs.go }}

      # The go/ module: gofmt (no diff), go vet, and the conformance harness
      # (four artifacts x 15 bundles + config corpus + drift/hash units +
      # runner + the go test adapter).
      - name: gofmt
        working-directory: go
        run: test -z "$(gofmt -l .)" || { echo 'gofmt needed:'; gofmt -l .; exit 1; }
      - name: vet
        working-directory: go
        run: go vet ./...
      - name: test
        working-directory: go
        run: go test ./...

      # The conformance harness is a SEPARATE nested module (go/conformance) so
      # its symlinked bNN fixtures never enter the published module zip — see
      # go/conformance/go.mod. It must be built from its own directory.
      - name: conformance
        working-directory: go/conformance
        run: test -z "$(gofmt -l .)" && go vet ./... && go test ./...

      # Standalone sample project (see examples/go-gotest): runs the Markdown
      # specs through the module via `go test`.
      - name: examples
        working-directory: examples/go-gotest
        run: go test ./...
