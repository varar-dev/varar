# Runs in the varar-dev/varar-examples repo, where examples/ is synced on every
# release of varar-dev/varar. In the monorepo this file is inert (GitHub only
# reads workflows from the repo root); the monorepo runs the projects against
# the local build via .github/workflows/*.yml instead.
name: rust-cargotest

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch bit-rot against the released pins.
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-cargotest
    steps:
      - uses: actions/checkout@v7

      # No toolchain action: rust-toolchain.toml pins the channel and rustup
      # auto-installs it on the first cargo invocation.
      # No lockfile is synced — cargo resolves fresh from the released pins.
      - run: cargo test
