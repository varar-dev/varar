# Runs in the varar-dev/varar-examples repo, where examples/ is synced on every
# release of varar-dev/varar. In the monorepo this file is inert (GitHub only
# reads workflows from the repo root); the monorepo runs the projects against
# the local build via .github/workflows/*.yml instead.
name: typescript-vitest

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch bit-rot against the released npm packages.
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript-vitest
    steps:
      - uses: actions/checkout@v7

      # No version here — pnpm/action-setup reads "packageManager" from this
      # project's package.json, the same field corepack uses locally. The path
      # is explicit because `defaults.run.working-directory` applies only to
      # `run:` steps: an action still resolves paths from the repo root, and
      # varar-examples has no package.json there ("No pnpm version is
      # specified").
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: typescript-vitest/package.json

      # No version here — .node-version is the pin, read by setup-node and by
      # nvm/fnm/asdf alike, so CI and a developer machine cannot drift.
      - uses: actions/setup-node@v7
        with:
          node-version-file: typescript-vitest/.node-version

      # No lockfile is synced — resolve fresh from the released pins.
      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - run: pnpm test
