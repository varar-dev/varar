# Runs in the varar-dev/varar-examples repo, where examples/ is synced on every
# release of varar-dev/varar. In the monorepo this file is inert (GitHub only
# reads workflows from the repo root); the monorepo runs the projects against
# the local build via .github/workflows/*.yml instead.
name: python-unittest

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch bit-rot against the released PyPI pins.
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-unittest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v9.0.0 # no bare v8 alias tag exists (v1-v7 only)
        with:
          enable-cache: true

      # No lockfile is synced — uv resolves fresh from the released PyPI pins.
      - run: uv run python -m unittest
