# Pin the example project to the same toolchain as rust/ (see
# rust/rust-toolchain.toml). Without this, `make rust` runs cargo here under
# whatever `rustup` default the checkout happens to have, and edition 2024
# needs >= 1.85. rustup auto-installs this on first cargo invocation.
[toolchain]
channel = "1.97"
components = ["rustfmt", "clippy"]
